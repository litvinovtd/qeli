name: DCO

# Verify every commit in a pull request carries a Signed-off-by line
# (Developer Certificate of Origin — see CONTRIBUTING.md). Lightweight
# alternative to a CLA: contributors sign off with `git commit -s`.
on:
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on all PR commits
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          fail=0
          for c in $(git rev-list --no-merges "$base..$head"); do
            # Bots (dependabot, github-actions) open PRs/commits they cannot sign off —
            # exempt them, the same way merges are excluded above.
            if git show -s --format='%an <%ae>' "$c" | grep -qiE '\[bot\]|dependabot|github-actions'; then
              continue
            fi
            if ! git show -s --format='%B' "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              author="$(git show -s --format='%an <%ae>' "$c")"
              echo "::error::Commit ${c:0:12} by ${author} is missing 'Signed-off-by'. Run: git commit -s (or git rebase --signoff)."
              fail=1
            fi
          done
          # Advisory only: report missing sign-offs but do NOT fail CI. This is a
          # single-maintainer pre-release repo, and blocking every push on a Signed-off-by
          # backlog was pure noise. Use `git commit -s` going forward; before a public
          # release, sign the history in one shot with `git rebase --signoff origin/main`.
          if [ "$fail" = "1" ]; then
            echo "::warning::Some non-bot commits are missing 'Signed-off-by' (advisory, not blocking). Use 'git commit -s'; run 'git rebase --signoff origin/main' before a public release."
          else
            echo "All commits are signed off (DCO OK)."
          fi
