name: docker-publish

# Build the multi-arch qeli image (both roles, all deps) and publish it to GHCR
# on every release tag, so `ghcr.io/<owner>/qeli:latest` always tracks the latest
# release. Manual runs (workflow_dispatch) build from the selected branch/tag.
#
# Result: users never rebuild — `docker pull ghcr.io/litvinovtd/qeli:latest`.
# The Dockerfile itself is version-agnostic (it builds whatever source is checked
# out), so the tag drives the version.

on:
  push:
    tags: ['v*']            # v0.7.3, v0.8.0, …
  workflow_dispatch:        # manual run to (re)publish the current ref

permissions:
  contents: read
  packages: write           # push to GHCR with the automatic GITHUB_TOKEN
  id-token: write           # OIDC token for the signed build attestation (R-02)
  attestations: write       # record the attestation against this repo (R-02)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # QEMU lets the single amd64 runner build the arm images (emulated). A Rust
      # compile under emulation is slow — a release build of all three arches can
      # take a while; trim `platforms` below if you only need some.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags from the git ref: the semver version (from a v* tag) + `latest`.
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            # `latest` only for a real release tag — never a pre-release (v1.2.3-rc1),
            # so an RC can never clobber the tag users pull by default.
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .                              # repo root (the build context)
          file: release/docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true                        # BuildKit inline SLSA provenance
          sbom: true                              # SPDX SBOM attached to the image (R-02)
          # Cache layers across publishes so a re-run doesn't recompile Rust from
          # scratch under QEMU for every arch.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A SIGNED, INDEPENDENTLY VERIFIABLE attestation on top of BuildKit's inline
      # provenance. The inline one travels inside the image and is only as trustworthy as
      # whoever can push that image; this one is signed via OIDC and checked against the
      # repository, so a consumer can prove the image came from THIS repo and commit:
      #
      #   gh attestation verify oci://ghcr.io/litvinovtd/qeli:latest -R litvinovtd/qeli
      #
      # Answers the question a checksum cannot: not "is this the file the release lists"
      # but "who built it, from what source". (R-02)
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
