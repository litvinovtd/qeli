name: CI

on:
  push:
    paths:
      - 'qeli/**'
      - 'qeli-android/**'
      - 'qeli-win/**'
      - 'qeli-mac/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'qeli/**'
      - 'qeli-android/**'
      - 'qeli-win/**'
      - 'qeli-mac/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: qeli

jobs:
  # Hard gate: the crate is Linux-only (TUN/TAP via libc), so build + the full
  # unit-test suite must be green. This is what blocks a merge.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qeli
      - name: Build
        run: cargo build --bin qeli --release
      - name: Test
        run: cargo test --all

  # Hard gate: the tree was normalized (one-time `cargo fmt` + clippy pass), so
  # formatting and lint cleanliness are now enforced. `-D warnings` fails the
  # build on any clippy warning.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qeli
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  # Soft gate: the client apps must at least compile. The native realtls core
  # (libqeli.so / qeli.dll / libqeli.dylib) is committed under each client, so
  # these jobs only need the platform toolchain — they do NOT cross-build Rust.
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v4
      - name: Assemble debug APK
        working-directory: qeli-android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build QeliWin (Release)
        working-directory: qeli-win
        run: dotnet build QeliWin/QeliWin.csproj -c Release

  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build QeliMac (Release)
        working-directory: qeli-mac
        run: dotnet build QeliMac/QeliMac.csproj -c Release

  # Soft-gate: клиент для роутера (Keenetic) кросс-компилируется под обе арки —
  # aarch64 (stable) и mipsel (tier-3: nightly + -Zbuild-std). Линкер/cc — zig через
  # cargo-zigbuild (OpenWrt SDK не нужен). Только сборка; рантайм проверяется на устройстве.
  # Арк-специфичные TUNSETIFF (тип/значение) и float-ABI mipsel видны ТОЛЬКО здесь, не на
  # x86-гейте build-test выше — этот job ловит молчаливую поломку кросс-сборки.
  keenetic-cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-unknown-linux-musl
            toolchain: stable
          - arch: mipsel
            target: mipsel-unknown-linux-musl
            toolchain: nightly
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Per-arch toolchain bits
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            rustup target add aarch64-unknown-linux-musl
          else
            rustup component add rust-src
          fi
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qeli
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Cross-build qeli-client (${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "mipsel" ]; then
            RUSTFLAGS='-C link-arg=-msoft-float' cargo zigbuild -Z build-std=std,panic_abort \
              --release --bin qeli-client --no-default-features --features client-bin \
              --target ${{ matrix.target }}
          else
            cargo zigbuild \
              --release --bin qeli-client --no-default-features --features client-bin \
              --target ${{ matrix.target }}
          fi
      - name: Artifact info
        run: file target/${{ matrix.target }}/release/qeli-client

  # Soft gate: build the fuzz harnesses and run a short smoke on each. Catches a
  # build break / API drift in the untrusted-input parsers (ClientHello, packet
  # codec, realtls record) and any crash reachable within the time budget. Not a
  # merge blocker — full fuzzing is run out-of-band (see qeli/fuzz/README.md).
  fuzz-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qeli
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Smoke each target (30s)
        working-directory: qeli
        run: |
          for t in clienthello packet_decrypt realtls_record; do
            echo "=== fuzz $t ==="
            cargo +nightly fuzz run "$t" -- -max_total_time=30
          done

  # Advisory: surface known RustSec advisories in the dependency tree. Non-gating
  # for now (a transient upstream advisory shouldn't block a merge); promote to a
  # hard gate once the tree is triaged clean.
  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qeli
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
