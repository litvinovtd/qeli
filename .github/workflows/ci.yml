name: CI

on:
  push:
    paths:
      - 'qeli/**'
      # The desktop clients' SHARED crypto/protocol (PacketCodec, HKDF, ChaCha20,
      # ObfsStream, realtls glue) lives here and is ProjectReference'd by both
      # qeli-win and qeli-mac — without it a shared-only change shipped with no CI
      # at all.
      - 'qeli-shared/**'
      - 'qeli-android/**'
      - 'qeli-win/**'
      - 'qeli-mac/**'
      # Added with the ios-build / native-libs jobs — a job whose paths filter never
      # matches is worse than no job: it shows up green having run nothing. (R-05/R-06)
      - 'qeli-ios/**'
      - 'native-libs/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'qeli/**'
      - 'qeli-shared/**'
      - 'qeli-android/**'
      - 'qeli-win/**'
      - 'qeli-mac/**'
      # Added with the ios-build / native-libs jobs — a job whose paths filter never
      # matches is worse than no job: it shows up green having run nothing. (R-05/R-06)
      - 'qeli-ios/**'
      - 'native-libs/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
  schedule:
    # Nightly continuous fuzzing (the `fuzz-nightly` job; other jobs also run as a
    # free health check). 03:17 UTC — off the top of the hour to dodge scheduler load.
    - cron: '17 3 * * *'

defaults:
  run:
    working-directory: qeli

jobs:
  # Hard gate: the committed native libraries (.so/.dll/.dylib) must match their
  # manifest. They are opaque blobs whose diff no reviewer can read, so without this a
  # swapped binary passes review unnoticed; the manifest also pins each canonical copy to
  # the copy the build stack actually consumes, so the two cannot drift apart and ship a
  # stale library. Cheap (hashing ~19 MB) and needs no toolchain. (R-06)
  native-libs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .          # the script expects the repo root, not qeli/
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Verify native library hashes
        run: bash native-libs/verify.sh

  # Hard gate: the crate is Linux-only (TUN/TAP via libc), so build + the full
  # unit-test suite must be green. This is what blocks a merge.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: qeli
      - name: Build
        run: cargo build --bin qeli --release
      - name: Test
        run: cargo test --workspace

  # Hard gate: the tree was normalized (one-time `cargo fmt` + clippy pass), so
  # formatting and lint cleanliness are now enforced. `-D warnings` fails the
  # build on any clippy warning.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: qeli
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  # Documentation gate: no broken links, no orphaned pages, ru/eng file parity, and
  # every INI key the server actually emits is covered by CONFIG.md in BOTH languages
  # (the last one is what let a phantom key live in one language only).
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: docs checks
        run: python3 scripts/check_docs.py

  # Soft gate: the client apps must at least compile. The native realtls core
  # (libqeli.so / qeli.dll / libqeli.dylib) is committed under each client, so
  # these jobs only need the platform toolchain — they do NOT cross-build Rust.
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Assemble debug APK
        working-directory: qeli-android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug
      # The JVM unit tests (BackupCryptoTest, ObfsStreamTest) already existed but
      # nothing ran them — assembleDebug only proves it compiles.
      - name: Unit tests (JVM)
        working-directory: qeli-android
        run: ./gradlew --no-daemon testDebugUnitTest
      # `assembleDebug` compiles the DEBUG variant, which has different rules: release-only
      # problems (missing ProGuard keep-rules, manifest issues, API-level misuse flagged by
      # lint) never showed up in CI at all. lintRelease covers the variant users install.
      # `-Dlint.baselines.continue=true` so an existing baseline file doesn't abort the run.
      # (R-05)
      - name: Android lint (release variant)
        working-directory: qeli-android
        run: ./gradlew --no-daemon lintRelease -Dlint.baselines.continue=true

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'
      - name: Build QeliWin (Release)
        working-directory: qeli-win
        run: dotnet build QeliWin/QeliWin.csproj -c Release
      # `dotnet build` only proved it compiles. The headless `selftest` verb checks the
      # SHARED crypto/protocol (X25519, HKDF, ChaCha20-Poly1305, PacketCodec incl.
      # counter/replay, ObfsStream, INI/qeli:// parsing) — no network, no admin.
      # Invoked through the dotnet host on the managed DLL: the .exe manifest demands
      # elevation, which the self-test itself does not need.
      - name: Self-test QeliWin (headless crypto/codec/parse round-trips)
        working-directory: qeli-win
        run: dotnet exec QeliWin/bin/Release/net10.0-windows/win-x64/QeliWin.dll selftest

  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'
      - name: Build QeliMac (Release)
        working-directory: qeli-mac
        run: dotnet build QeliMac/QeliMac.csproj -c Release
      - name: Self-test QeliMac (headless crypto/codec/parse round-trips)
        working-directory: qeli-mac
        run: dotnet exec QeliMac/bin/Release/net10.0/QeliMac.dll selftest
      # Build BOTH macOS architectures explicitly. The utun ioctl P/Invoke has an
      # arch-conditional signature (Apple ARM64 passes the variadic arg on the stack,
      # x86_64 in a register — C-07), so the Intel path is a distinct code path that a
      # single default-RID build never compiles. Shipped builds are universal, so a break
      # here would only surface on a user's Intel Mac. (R-05)
      - name: Build both macOS RIDs (arm64 + Intel)
        working-directory: qeli-mac
        run: |
          dotnet build QeliMac/QeliMac.csproj -c Release -r osx-arm64
          dotnet build QeliMac/QeliMac.csproj -c Release -r osx-x64

  # iOS had NO CI at all: the Swift client (QeliCore crypto/protocol + the packet-tunnel
  # extension) could stop compiling and nothing would notice until a manual Xcode build.
  # The project is generated by XcodeGen from project.yml, so CI generates it the same way
  # the developer script does rather than committing a .xcodeproj. Simulator build + the
  # existing QeliIOSTests; no signing, so no certificates are needed. (R-05)
  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate the Xcode project
        working-directory: qeli-ios
        run: ./generate_project.sh
      - name: Build (iOS Simulator, no signing)
        working-directory: qeli-ios
        run: |
          set -euo pipefail
          xcodebuild build \
            -project QeliIOS.xcodeproj \
            -scheme QeliIOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Unit tests (QeliCore crypto/protocol)
        working-directory: qeli-ios
        run: |
          set -euo pipefail
          # Pick whatever iPhone simulator this runner image ships — hardcoding a model
          # breaks every time GitHub rolls the image forward.
          xcrun simctl list devices available -j > /tmp/sims.json
          dest=$(python3 -c "import json; d=json.load(open('/tmp/sims.json'))['devices']; print(next(x['udid'] for v in d.values() for x in v if 'iPhone' in x['name']))")
          echo "using simulator $dest"
          xcodebuild test \
            -project QeliIOS.xcodeproj \
            -scheme QeliIOS \
            -destination "id=$dest" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  # Soft-gate: клиент для роутера (Keenetic) кросс-компилируется под обе арки —
  # aarch64 (stable) и mipsel (tier-3: nightly + -Zbuild-std). Линкер/cc — zig через
  # cargo-zigbuild (OpenWrt SDK не нужен). Только сборка; рантайм проверяется на устройстве.
  # Арк-специфичные TUNSETIFF (тип/значение) и float-ABI mipsel видны ТОЛЬКО здесь, не на
  # x86-гейте build-test выше — этот job ловит молчаливую поломку кросс-сборки.
  keenetic-cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-unknown-linux-musl
            toolchain: stable
          - arch: mipsel
            target: mipsel-unknown-linux-musl
            toolchain: nightly
          # armv7 is a shipped OpenWrt target but was missing from the matrix, so a
          # 32-bit-only break could still slip through even though mipsel is covered.
          # Same soft-float / stable toolchain path as aarch64 (tier-2, no build-std).
          - arch: armv7
            target: armv7-unknown-linux-musleabihf
            toolchain: stable
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.13.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Per-arch toolchain bits
        run: |
          # mipsel is tier-3: no prebuilt std, so build-std needs rust-src. aarch64 and
          # armv7 are tier-2: install the prebuilt std target instead.
          if [ "${{ matrix.arch }}" = "mipsel" ]; then
            rustup component add rust-src
          else
            rustup target add ${{ matrix.target }}
          fi
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: qeli
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Cross-build qeli-client (${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "mipsel" ]; then
            RUSTFLAGS='-C link-arg=-msoft-float' cargo zigbuild -Z build-std=std,panic_abort \
              --release --bin qeli-client --no-default-features --features client-bin \
              --target ${{ matrix.target }}
          else
            cargo zigbuild \
              --release --bin qeli-client --no-default-features --features client-bin \
              --target ${{ matrix.target }}
          fi
      - name: Artifact info
        run: file target/${{ matrix.target }}/release/qeli-client

  # Soft gate: build the fuzz harnesses and run a short smoke on each. Catches a
  # build break / API drift in the untrusted-input parsers (ClientHello, packet
  # codec, realtls record) and any crash reachable within the time budget. Not a
  # merge blocker — full fuzzing is run out-of-band (see qeli/fuzz/README.md).
  fuzz-smoke:
    runs-on: ubuntu-latest
    # The job as a whole stays soft: it runs on the NIGHTLY toolchain, so upstream drift
    # could otherwise block every merge for reasons unrelated to this code. But the part
    # that catches real regressions — do the harnesses still COMPILE against the parsers —
    # is gated per-step below. (R-04)
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: qeli
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Build first and report the outcome explicitly: an API drift that stops the
      # harnesses compiling is a genuine regression in the untrusted-input parsers, and
      # `continue-on-error` on the job would otherwise bury it. Annotated as an error in
      # the run summary even though the job is allowed to pass. (R-04)
      - name: Build the fuzz harnesses
        working-directory: qeli
        run: |
          set -euo pipefail
          if ! cargo +nightly fuzz build; then
            echo "::error::fuzz harnesses no longer build — the parser API drifted"
            exit 1
          fi
      - name: Smoke each target (30s)
        working-directory: qeli
        run: |
          for t in clienthello packet_decrypt realtls_record obfs_datagram quic udp_frag; do
            echo "=== fuzz $t ==="
            cargo +nightly fuzz run "$t" -- -max_total_time=30
          done

  # Continuous fuzzing: a longer nightly run of each target with a corpus persisted
  # across runs, so coverage accumulates (the push `fuzz-smoke` above is only a 30s
  # build-break check with no corpus). Per-target matrix runs in parallel; a crash
  # fails that target and uploads the reproducer as an artifact. Scheduled/manual only.
  fuzz-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [clienthello, packet_decrypt, realtls_record, obfs_datagram, quic, udp_frag]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: qeli
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Restore/seed corpus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          # Repo-root-relative (not affected by defaults.working-directory). A fresh
          # key each run + prefix restore-keys = an always-updating corpus cache.
          path: qeli/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      - name: Fuzz ${{ matrix.target }} (10 min)
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=600
      - name: Upload crash reproducer
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: qeli/fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore

  # Advisory: surface known RustSec advisories in the dependency tree. Non-gating
  # for now (a transient upstream advisory shouldn't block a merge); promote to a
  # hard gate once the tree is triaged clean.
  security-audit:
    runs-on: ubuntu-latest
    # HARD GATE (R-04). Was `continue-on-error: true` with a note to promote it "once the
    # tree is triaged clean" — it now is: `cargo audit` reports 0 vulnerabilities, only one
    # allowed `unmaintained` warning (RUSTSEC-2025-0134, rustls-pemfile). A soft security
    # gate reports a new CVE into a log nobody reads, which is the same as not having one.
    # NB: cargo audit exits 0 on warnings and non-zero on VULNERABILITIES, so an
    # unmaintained-crate advisory still does not block a merge — only a real CVE does.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: qeli
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
