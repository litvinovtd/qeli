# qeli reality-tls КЛИЕНТ (полный INI-конфиг) — ШАБЛОН. Заполни ВСЕ плейсхолдеры
# (YOUR_*) реальными значениями своего сервера; держи этот файл вне публичного репо.
#
# reality-tls раздаётся и через qeli:// ссылку/QR (ссылка несёт `rsid=`); этот
# полный INI — альтернатива. key/reality_sid ДОЛЖНЫ совпадать с серверным профилем:
#   key         = identity-pubkey сервера (qeli show-identity --config server-reality.conf)
#   reality_sid = один из server `short_ids`
#
# Импорт:
#   - Rust CLI:  qeli client -c client-reality.conf
#   - Android/Win/Mac: импорт этого INI как профиля (mode=reality-tls + key + reality_sid).

[qeli]
server = YOUR_SERVER_HOST:443
proto = tcp
user = YOUR_USERNAME
pass = YOUR_PASSWORD
key = YOUR_SERVER_PUBKEY_HEX
mode = reality-tls
reality_sid = YOUR_SHORT_ID_HEX
sni = www.microsoft.com
# H-1: bind session keys to the server static identity (Noise-IK). On by default since
# 0.7.1; the reality-tls server runs it too. Requires the pinned `key` above (reality
# already mandates it). Set false only for a legacy 0.7.0 server.
bind_static = true

[logging]
level = info
