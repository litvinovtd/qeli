# qeli reality-tls server — ОСНОВНОЙ профиль: настоящий REALITY (real TLS 1.3
# termination) на :443 по умолчанию. На проводе — настоящий Chrome-грейд TLS 1.3,
# который сервер терминирует (hand-rolled терминатор с cert-borrowing — см.
# handrolled ниже; rustls — только при handrolled=false) и несёт qeli-туннель внутри.
#
# DPI-эффект: закрывает теллы 1.1–1.6 из docs/DPI-AUDIT.md (нет ALPN, 3 cipher,
# пустой ServerHello и т.д.) — в отличие от прежнего fake-tls.
#
# Это дефолт. Дополнительные профили (другие порты/режимы) при необходимости
# добавляются вручную отдельными секциями [profile:...].
#
# ВНИМАНИЕ при миграции живого сервера: real_tls требует, чтобы КЛИЕНТ говорил
# mode=reality-tls. Старые fake-tls клиенты на :443 перестанут подключаться сразу
# после включения real_tls — их надо перевести на client-reality.conf. Если нужен
# бесшовный поэтапный переход, временно поднимите ВТОРОЙ профиль (старый fake-tls)
# на другом порту, мигрируйте клиентов, затем уберите его.

[auth]
require_client_key_proof = true

[logging]
level = debug
file = /var/log/qeli/server.log

[profile:maxobf]
identity_key = /etc/qeli/identity/maxobf.key
bind.address = 0.0.0.0
bind.port = 443
bind.transport = tcp
tun.name = vpn0
tun.address = 10.9.0.1
tun.netmask = 255.255.255.0
tun.mtu = 1400
tun.device_type = tun
pool.cidr = 10.9.0.0/24
pool.exclude = 10.9.0.1
routing.forward_private = true
routing.nat.enabled = true
dns.enabled = true
dns.listen = 10.9.0.1
dns.upstream = 1.1.1.1
obf.mode = fake-tls
obf.tls.server_name = www.microsoft.com
obf.tls.session_id = true
obf.tls.key_share_entropy_bytes = 32
obf.tls.reality_proxy.enabled = true
obf.tls.reality_proxy.target = www.microsoft.com
obf.tls.reality_proxy.target_port = 443
# >>> Ключевые строки REALITY real-TLS: <<<
obf.tls.reality_proxy.real_tls = true
# handrolled=true ОБЯЗАТЕЛЕН для cert-borrowing: сервер одалживает НАСТОЯЩУЮ цепочку
# сертификата target'а (microsoft) и зеркалит его JA3S. Без него идёт rustls-путь =
# self-signed серт + свой отпечаток (не паритет с Xray-REALITY).
obf.tls.reality_proxy.handrolled = true
# short_ids: allow-лист 8-байтовых (16 hex) идентификаторов «своих». СГЕНЕРИРУЙТЕ
# СВОЙ перед продом (напр. `openssl rand -hex 8`); этот — пример из тестов.
obf.tls.reality_proxy.short_ids = REPLACE_WITH_OWN_SHORT_ID
obf.padding.enabled = true
obf.padding.randomize = true
obf.padding.probability = 1.0
obf.padding.min_bytes = 40
obf.padding.max_bytes = 400
obf.heartbeat.enabled = true
obf.heartbeat.interval_ms = 15000
obf.heartbeat.data_size_bytes = 64
obf.heartbeat.jitter_ms = 5000
obf.anti_fingerprinting.enabled = true
obf.anti_fingerprinting.rotate_ciphers_every = 300
obf.anti_fingerprinting.add_jitter_to_handshake = true
obf.quic.enabled = false
perf.tcp.nodelay = true
perf.tcp.keepalive_secs = 30
perf.tun.read_buffer_size = 65535
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

# Пользователи (flat-INI). ЗАМЕНИ на своих — сгенерируй Argon2id-хеш через:
#   qeli add-client <username> --config server-reality.conf
# Плейсхолдер-юзер ниже НЕ работает (невалидный хеш) — это намеренно, чтобы
# шаблон нельзя было задеплоить «как есть» с известным паролем.
[user:CHANGEME]
password_hash = REPLACE_VIA__qeli_add-client
enabled = true
max_sessions = 2
