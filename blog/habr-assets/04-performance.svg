<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
<title>Пропускная способность qeli по режимам</title>
<desc>Столбчатая диаграмма upload и download в Мбит/с на двухъядерном стенде для plain, fake-tls, obfs, reality-tls.</desc>
<rect x="0" y="0" width="680" height="360" rx="10" fill="#FBFAF7" stroke="#E7E5DE"/>
<text x="40" y="34" font-size="18" font-weight="500" fill="#2C2C2A">Пропускная способность по режимам, Мбит/с</text>

<rect x="430" y="22" width="13" height="13" rx="3" fill="#D85A30"/>
<text x="449" y="33" font-size="12.5" fill="#5F5E5A">upload</text>
<rect x="520" y="22" width="13" height="13" rx="3" fill="#1D9E75"/>
<text x="539" y="33" font-size="12.5" fill="#5F5E5A">download</text>

<line x1="90" y1="114" x2="650" y2="114" stroke="#E7E5DE"/>
<line x1="90" y1="172.7" x2="650" y2="172.7" stroke="#E7E5DE"/>
<line x1="90" y1="231.3" x2="650" y2="231.3" stroke="#E7E5DE"/>
<line x1="90" y1="290" x2="650" y2="290" stroke="#B4B2A9"/>
<line x1="90" y1="70" x2="90" y2="290" stroke="#B4B2A9"/>

<text x="82" y="294" text-anchor="end" font-size="11" fill="#888780">0</text>
<text x="82" y="235.3" text-anchor="end" font-size="11" fill="#888780">200</text>
<text x="82" y="176.7" text-anchor="end" font-size="11" fill="#888780">400</text>
<text x="82" y="118" text-anchor="end" font-size="11" fill="#888780">600</text>

<rect x="118" y="131.6" width="38" height="158.4" rx="3" fill="#D85A30"/>
<rect x="164" y="84.7" width="38" height="205.3" rx="3" fill="#1D9E75"/>
<text x="137" y="126" text-anchor="middle" font-size="11" fill="#2C2C2A">540</text>
<text x="183" y="79" text-anchor="middle" font-size="11" fill="#2C2C2A">700</text>

<rect x="258" y="131.6" width="38" height="158.4" rx="3" fill="#D85A30"/>
<rect x="304" y="89.1" width="38" height="200.9" rx="3" fill="#1D9E75"/>
<text x="277" y="126" text-anchor="middle" font-size="11" fill="#2C2C2A">540</text>
<text x="323" y="83.5" text-anchor="middle" font-size="11" fill="#2C2C2A">685</text>

<rect x="398" y="143.3" width="38" height="146.7" rx="3" fill="#D85A30"/>
<rect x="444" y="119.9" width="38" height="170.1" rx="3" fill="#1D9E75"/>
<text x="417" y="137.7" text-anchor="middle" font-size="11" fill="#2C2C2A">500</text>
<text x="463" y="114.3" text-anchor="middle" font-size="11" fill="#2C2C2A">580</text>

<rect x="538" y="138.1" width="38" height="151.9" rx="3" fill="#D85A30"/>
<rect x="584" y="167.4" width="38" height="122.6" rx="3" fill="#1D9E75"/>
<text x="557" y="132.5" text-anchor="middle" font-size="11" fill="#2C2C2A">518</text>
<text x="603" y="161.8" text-anchor="middle" font-size="11" fill="#2C2C2A">418</text>

<text x="160" y="308" text-anchor="middle" font-size="12.5" fill="#2C2C2A">plain</text>
<text x="300" y="308" text-anchor="middle" font-size="12.5" fill="#2C2C2A">fake-tls</text>
<text x="440" y="308" text-anchor="middle" font-size="12.5" fill="#2C2C2A">obfs</text>
<text x="580" y="308" text-anchor="middle" font-size="12.5" fill="#2C2C2A">reality-tls</text>

<text x="40" y="332" font-size="11.5" fill="#888780">UDP ~400 Мбит/с при потерях &lt;0.5%. obfs — −10…15% (второй слой шифрования).</text>
<text x="40" y="348" font-size="11.5" fill="#888780">reality-tls платит за вложенный TLS, особенно на download (двойной AEAD).</text>
</svg>
