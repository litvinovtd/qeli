# ============================================================================
#  qeli — MAXIMUM-OBFUSCATION server profile (flat-INI)
# ----------------------------------------------------------------------------
#  Stealth stack: fake-TLS + REALITY proxy (probes are bridged to a real site) +
#  require_client_key_proof (server key never on the wire) + random padding +
#  jittered heartbeats + handshake anti-fingerprinting. Comments must be on their
#  OWN line (inline comments are not stripped).
#
#  Deploy: put at /etc/qeli/server-maxobf.conf, print the key with
#  `qeli show-identity --config ...`, pin it on clients (key = ...), start.
# ============================================================================

[auth]
# clients MUST pin the server key; unpinned clients are rejected
require_client_key_proof = true

[logging]
level = info
file = /var/log/qeli/server.log

[profile:maxobf]
bind.address = 0.0.0.0
bind.port = 443
bind.transport = tcp
tun.name = vpn0
tun.address = 10.9.0.1
tun.netmask = 255.255.255.0
tun.mtu = 1400
pool.cidr = 10.9.0.0/24
pool.exclude = 10.9.0.1
routing.forward_private = true
routing.nat.enabled = true
# in-tunnel DNS proxy (gateway IP, reachable in-tunnel) -> public upstream
dns.enabled = true
dns.listen = 10.9.0.1
dns.upstream = 1.1.1.1
obf.mode = fake-tls
# keep SNI identical to the REALITY target so a probe and a real client match
obf.tls.server_name = www.microsoft.com
obf.tls.session_id = true
obf.tls.key_share_entropy_bytes = 32
obf.tls.reality_proxy.enabled = true
obf.tls.reality_proxy.target = www.microsoft.com
obf.tls.reality_proxy.target_port = 443
# short_ids accepted from clients (hex, <=8 bytes); a client presents one in reality_sid
obf.tls.reality_proxy.short_ids = 7e78a17ad41f1004
# real_tls = true -> authenticated clients are terminated inside a GENUINE TLS 1.3
# session (true reality-tls). Pair with clients on mode = reality-tls.
obf.tls.reality_proxy.real_tls = true
# handrolled = true (default) borrows the target's real cert chain + JA3S (Xray
# parity); false falls back to rustls (self-signed, weaker camouflage).
obf.tls.reality_proxy.handrolled = true
# ms to peek the ClientHello before classifying client vs probe (raise for slow links)
obf.tls.reality_proxy.peek_timeout_ms = 1500
obf.padding.enabled = true
obf.padding.randomize = true
obf.padding.probability = 1.0
obf.padding.min_bytes = 40
obf.padding.max_bytes = 400
obf.heartbeat.enabled = true
obf.heartbeat.interval_ms = 15000
obf.heartbeat.data_size_bytes = 64
obf.heartbeat.jitter_ms = 5000
obf.anti_fingerprinting.enabled = true
obf.anti_fingerprinting.rotate_ciphers_every = 300
obf.anti_fingerprinting.add_jitter_to_handshake = true
obf.quic.enabled = false
perf.tcp.nodelay = true
perf.tcp.keepalive_secs = 30
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

# example user (regenerate the hash: qeli hash-password / qeli add-client)
[user:client1]
password_hash = $argon2id$v=19$m=16384,t=2,p=1$cWVsaVNhbHRWYWw$CCYuTv8pvqQrvhrBQW3KjPpEN0MZaFfTKv3HOcGqB8w
enabled = true
max_sessions = 2
