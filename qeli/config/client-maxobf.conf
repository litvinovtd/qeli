# ============================================================================
#  qeli — client for the MAXIMUM-OBFUSCATION server (server-maxobf.conf)
# ============================================================================
# Pair this with server-maxobf.conf. Because the server runs with
# require_client_key_proof = true, you MUST pin its static public key:
#
#   on the server:  qeli show-identity --config /etc/qeli/server-maxobf.conf
#   -> copy the 64-hex key into auth.server_public_key below.
#
# Without the correct pinned key the server will reject this client
# ("client must pin server key").
# ============================================================================

[server]
address = "10.66.116.10"     # public IP / hostname of the server
port = 443
protocol = "tcp"
connection_timeout_secs = 30
  [server.reconnect]
  enabled = true
  max_retries = -1                  # retry forever (exponential backoff)
  base_delay_secs = 1
  max_delay_secs = 60

[auth]
username = "phone"
password = "testpass123"            # must match the server user
# REQUIRED with require_client_key_proof: pin the server's static public key.
server_public_key = "PASTE_64_HEX_KEY_FROM_qeli_show-identity"

[tun]
name = "vpn0"
mtu = 1400

[routing]
mode = "full-tunnel"
add_default_gateway = true          # route ALL traffic through the tunnel

[dns]
mode = "tunnel"
servers = ["1.1.1.1", "8.8.8.8"]    # resolved through the tunnel + server NAT

[obfuscation]
mode = "fake-tls"                   # must match the server
# (the client auto-picks a realistic SNI; if you connect by hostname it uses
#  that hostname as the SNI)
  [obfuscation.padding]
  enabled = true
  randomize = true
  probability = 1.0
  min_bytes = 40
  max_bytes = 400
  [obfuscation.heartbeat]
  enabled = true
  interval_ms = 15000
  data_size_bytes = 64
  jitter_ms = 5000
  [obfuscation.quic]
  enabled = false

[performance]
tcp_nodelay = true
tun_buffer_size = 65535
idle_timeout_secs = 0

[logging]
level = "info"
