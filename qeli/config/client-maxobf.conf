# ============================================================================
#  qeli client — MAXIMUM-OBFUSCATION server (pair with server-maxobf.conf)
#  Current format: flat-INI, single [qeli] section (same as a qeli:// link).
# ============================================================================
# The maxobf server runs with require_client_key_proof = true, so you MUST pin
# its static public key:
#   on the server:  qeli show-identity --config /etc/qeli/server-maxobf.conf
#   -> paste the 64-hex key into `key` below.
# Without the correct pinned key the server rejects this client.
# Import into the Android/desktop app via "Import" (accepts this INI or a qeli://
# link); the CLI uses it with `qeli client --config client-maxobf.conf`.
# ============================================================================

[qeli]
# host:port of the maxobf server
server = 10.66.116.10:443
proto = tcp
user = phone
pass = testpass123
# fake-tls = REALITY-proxy front (reality_proxy.enabled on the server, no real_tls)
mode = fake-tls
# pinned server static public key (REQUIRED here) — from `qeli show-identity`
key = PASTE_64_HEX_KEY_FROM_qeli_show-identity
# SNI must match the server's reality_proxy target
sni = www.microsoft.com

[logging]
level = info
