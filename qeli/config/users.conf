# ============================================================================
#  qeli users database — flat-INI. One [user:<name>] section per user, optional
#  [group:<name>] templates. Referenced by auth.users_file (default
#  /etc/qeli/users.conf). Add users with `qeli add-client <name> [--password ...]`
#  — it Argon2id-hashes the password and appends the [user:<name>] section here.
# ============================================================================

[user:client1]
password_hash = $argon2id$v=19$m=16384,t=2,p=1$cWVsaVNhbHRWYWw$CCYuTv8pvqQrvhrBQW3KjPpEN0MZaFfTKv3HOcGqB8w
enabled = true
# Max concurrent DEVICES (each device carries its own stable id). 0 = inherit from
# `group`, then unlimited. At the cap a NEW device evicts this user's OLDEST session
# (newest wins); reconnecting the SAME device reuses its slot (doesn't count extra).
max_sessions = 2
# optional FIXED tunnel IP (must be inside the profile's pool.cidr). It always wins:
# a new connection/device takes this address and kicks whoever currently holds it — so
# a static_ip user has effectively ONE active session, and a reconnect from a new
# source IP keeps the same tunnel IP.
# static_ip = 10.9.0.50
# inherit max_sessions / bandwidth from [group:premium]
# group = premium
# restrict to these profiles; omit = all
# profiles = tcp, udp
# ACL: dst CIDRs this user may reach; omit = unrestricted
# allowed_networks = 10.9.0.0/24, 192.168.1.0/24
# per-user rate cap (Mbps); 0 = unlimited (or inherit from group)
# bandwidth.limit_mbps = 50
# per-user burst ceiling (Mbps); 0 = none
# bandwidth.burst_mbps = 100
# extra route pushed to THIS user (repeatable)
# route = 10.20.0.0/16 gateway=10.9.0.1 metric=100
# arbitrary key=value tags (metadata.<key> = <value>), repeatable
# metadata.note = vip

[group:premium]
bandwidth_limit_mbps = 100
# Default device cap for members without their own max_sessions (0 = unlimited).
max_sessions = 3
# default dst-CIDR ACL for members without their own
# allowed_networks = 10.9.0.0/24

