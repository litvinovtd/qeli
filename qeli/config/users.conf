# ============================================================================
#  qeli users database — flat-INI. One [user:<name>] section per user, optional
#  [group:<name>] templates. Referenced by auth.users_file (default
#  /etc/qeli/users.conf). Add users with `qeli add-client <name> [--password ...]`
#  — it Argon2id-hashes the password and appends the [user:<name>] section here.
# ============================================================================

[user:client1]
password_hash = $argon2id$v=19$m=16384,t=2,p=1$cWVsaVNhbHRWYWw$CCYuTv8pvqQrvhrBQW3KjPpEN0MZaFfTKv3HOcGqB8w
enabled = true
# Max concurrent DEVICES (each device carries its own stable id). 0 = inherit from
# `group`, then unlimited. At the cap a NEW device evicts this user's OLDEST session
# (newest wins); reconnecting the SAME device reuses its slot (doesn't count extra).
max_sessions = 2
# static_ip = 10.0.0.50         # optional fixed tunnel IP
# group = premium               # inherit max_sessions / bandwidth from [group:premium]
# profiles = tcp, udp           # restrict to these profiles; omit = all

[group:premium]
bandwidth_limit_mbps = 100
# Default device cap for members without their own max_sessions (0 = unlimited).
max_sessions = 3
