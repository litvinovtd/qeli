# ============================================================================
#  qeli server — READY-MADE MULTI-PROFILE example: one profile per wire mode (9),
#  named by mode, the way a real production box is laid out (reality-tls on :443,
#  the rest on 8443-8450). Copy a profile, tweak it, delete the modes you don't
#  want. Users are global ([user:*] / users.conf) and work on every profile.
#
#  This is a TEMPLATE, not the exhaustive key reference — for every option with
#  its default see server.conf(.example). Getting started: GETTING-STARTED.md.
#
#  ⚠️ Before using: replace every CHANGEME (obfs pre-shared keys), set your own
#  reality short_ids, and add users with `qeli add-client`. For full-tunnel egress
#  (routing.nat.enabled = true below) the `iptables` package must be installed.
#
#  SNI semantics (important): obf.tls.server_name is COSMETIC for fake-tls (the
#  server ignores it; it only seeds the SNI baked into a share link). The client
#  picks its own SNI: a configured/link `sni` wins, else a random decoy from the
#  built-in pool when connecting to a bare IP, else the connect hostname. So for
#  per-connection SNI rotation on fake-tls, leave the client `sni` EMPTY and connect
#  by IP. For reality / reality-tls the SNI is NOT cosmetic — it must equal
#  reality_proxy.target (see the note on the reality-tls profile below).
#
#  Stealth posture: every masking profile here uses flow-shaping (Poisson idle
#  cover) instead of a fixed heartbeat, so there is no ~15s beacon to fingerprint.
# ============================================================================

[auth]
# reality-tls needs the client to pin the server key; require it globally so every
# share link carries key= (anti-MITM for all modes). Pairs with bind_static (H-1).
require_client_key_proof = true
bind_static_to_session = true
brute_force.max_attempts = 5
brute_force.window_secs = 60
brute_force.lockout_secs = 300

[logging]
level = info
file = /var/log/qeli/server.log

[web]
# Admin UI. Disabled here — enable it and set a password with `qeli set-web-password`
# (see PANEL.md). On a public bind you MUST also set tls = true and password_hash,
# or the panel refuses to start (fail-closed).
enabled = false
bind = 127.0.0.1
port = 8080
username = admin
# tls = true
# password_hash = $argon2id$...        # set via `qeli set-web-password`
# public_host = vpn.example.com         # default host for share links/QR
# allowed_ips = 203.0.113.4             # source-IP allowlist (include your own IP!)

# ── 1) reality-tls — genuine TLS 1.3 carrying the tunnel — TCP :443 ──────────
[profile:reality-tls]
enabled = true
bind.address = 0.0.0.0
bind.port = 443
bind.transport = tcp
tun.name = vpn0
tun.address = 10.9.0.1
tun.netmask = 255.255.255.0
# 1280 is conservative for TCP-carried modes (nested TCP); 1400 is the default.
tun.mtu = 1400
tun.queues = 0
pool.cidr = 10.9.0.0/24
pool.exclude = 10.9.0.1
# Full-tunnel egress (programs iptables: ip_forward + MASQUERADE + MSS). Requires
# the `iptables` package. Set false for split-tunnel.
routing.nat.enabled = true
routing.forward_private = true
dns.enabled = true
dns.listen = 10.9.0.1
dns.upstream = 1.1.1.1
obf.mode = reality-tls
obf.tls.server_name = www.microsoft.com
obf.tls.reality_proxy.enabled = true
obf.tls.reality_proxy.target = www.microsoft.com
obf.tls.reality_proxy.target_port = 443
obf.tls.reality_proxy.real_tls = true
# Example short_id — GENERATE YOUR OWN (qeli / gen_reality_link); clients must send one.
obf.tls.reality_proxy.short_ids = 0123456789abcdef
# reality-tls runs inside real TLS, so on-wire padding adds only overhead — off.
obf.padding.enabled = false
# SNI is NOT cosmetic here: reality-tls mimics ONE real site (reality_proxy.target),
# so the client MUST send server_name == target or the disguise breaks (SNI would not
# match the relayed cert). Do not rotate it. For several front domains, run several
# reality-tls profiles, each with its own target + matching client links.
obf.heartbeat.enabled = false
# Idle cover (parity with the prod maxobf posture): hide the dead-air / beacon tell
# even inside the real-TLS session. Zero added latency; costs only idle bandwidth.
obf.traffic_shaping.enabled = true
obf.traffic_shaping.idle_gap_mean_ms = 700
obf.traffic_shaping.idle_gap_min_ms = 40
obf.traffic_shaping.idle_gap_max_ms = 6000
obf.traffic_shaping.budget_bytes_per_sec = 16384
obf.quic.enabled = false
# Stream bonding (multipath): N parallel connections aggregated into one session
# (TCP modes only). adaptive = ramp up under load.
obf.multipath.enabled = true
obf.multipath.adaptive = true
perf.tcp.nodelay = true
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

# ── 2) reality — REALITY proxy (fake-TLS peek-and-decide, no inner TLS) — TCP :8443
[profile:reality]
enabled = true
bind.address = 0.0.0.0
bind.port = 8443
bind.transport = tcp
tun.name = vpn1
tun.address = 10.9.1.1
tun.netmask = 255.255.255.0
tun.mtu = 1400
tun.queues = 0
pool.cidr = 10.9.1.0/24
pool.exclude = 10.9.1.1
routing.nat.enabled = true
routing.forward_private = true
dns.enabled = true
dns.listen = 10.9.1.1
dns.upstream = 1.1.1.1
obf.mode = fake-tls
obf.tls.server_name = www.microsoft.com
obf.tls.reality_proxy.enabled = true
obf.tls.reality_proxy.target = www.microsoft.com
obf.tls.reality_proxy.target_port = 443
obf.tls.reality_proxy.real_tls = false
obf.tls.reality_proxy.short_ids = fedcba9876543210
obf.padding.enabled = true
obf.padding.min_bytes = 40
obf.padding.max_bytes = 400
# Flow-shaping: Poisson-gapped idle cover REPLACES the fixed heartbeat, killing the
# ~15s small-packet beacon (a timing fingerprint). Empty encrypted records the peer
# drops; real packets are never delayed (zero added latency), only genuine idle is
# filled, capped by the budget below. Works on TCP and UDP profiles alike.
obf.heartbeat.enabled = false
obf.traffic_shaping.enabled = true
obf.traffic_shaping.idle_gap_mean_ms = 700
obf.traffic_shaping.idle_gap_min_ms = 40
obf.traffic_shaping.idle_gap_max_ms = 6000
obf.traffic_shaping.budget_bytes_per_sec = 16384
obf.traffic_shaping.min_size = 64
obf.traffic_shaping.max_size = 1024
obf.quic.enabled = false
obf.multipath.enabled = true
obf.multipath.adaptive = true
perf.tcp.nodelay = true
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

