# ── 4) obfs-ws — ChaCha20 stream obfs + WebSocket-fronting — TCP :8445 ───────
[profile:obfs-ws]
enabled = true
bind.address = 0.0.0.0
bind.port = 8445
bind.transport = tcp
tun.name = vpn3
tun.address = 10.9.3.1
tun.netmask = 255.255.255.0
tun.mtu = 1400
tun.queues = 0
pool.cidr = 10.9.3.0/24
pool.exclude = 10.9.3.1
routing.nat.enabled = true
routing.forward_private = true
dns.enabled = true
dns.listen = 10.9.3.1
dns.upstream = 1.1.1.1
obf.mode = obfs
# REQUIRED for obfs: a strong shared secret that MUST match the client.
obf.obfs_key = CHANGEME-obfs-ws-psk
# obf.obfs_fronting = websocket now emits REAL WebSocket binary frames (not just an
# HTTP-looking first-byte preamble), so the stream reads as a genuine WS upgrade.
obf.obfs_fronting = websocket
# AmneziaWG-style junk: before the handshake, prepend jc junk packets of jmin..jmax random
# bytes to defeat pre-handshake signature/FET matching. Works on TCP `obfs` AND every UDP
# mode (fake-tls/quic/obfs) — it has NO effect only on a TCP fake-tls/reality-tls profile,
# where junk before the real TLS ClientHello would break the mimicry (the server warns + the
# share link omits awg there). On TCP the CLIENT MUST set the SAME jc (awg=true, jc=4,
# jmin=40, jmax=200) — both ends agree on the count; on UDP jc is sender-only (see udp-obfs).
obf.awg.enabled = true
obf.awg.jc = 4
obf.awg.jmin = 40
obf.awg.jmax = 200
obf.padding.enabled = false
# Flow-shaping: Poisson-gapped idle cover REPLACES the fixed heartbeat, killing the
# ~15s small-packet beacon (a timing fingerprint). Empty encrypted records the peer
# drops; real packets are never delayed (zero added latency), only genuine idle is
# filled, capped by the budget below. Works on TCP and UDP profiles alike.
obf.heartbeat.enabled = false
obf.traffic_shaping.enabled = true
obf.traffic_shaping.idle_gap_mean_ms = 700
obf.traffic_shaping.idle_gap_min_ms = 40
obf.traffic_shaping.idle_gap_max_ms = 6000
obf.traffic_shaping.budget_bytes_per_sec = 16384
obf.traffic_shaping.min_size = 64
obf.traffic_shaping.max_size = 1024
obf.quic.enabled = false
obf.multipath.enabled = true
obf.multipath.adaptive = true
perf.tcp.nodelay = true
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

# ── 5) obfs-none — ChaCha20 stream obfs, no fronting — TCP :8446 ─────────────
[profile:obfs-none]
enabled = true
bind.address = 0.0.0.0
bind.port = 8446
bind.transport = tcp
tun.name = vpn4
tun.address = 10.9.4.1
tun.netmask = 255.255.255.0
tun.mtu = 1400
tun.queues = 0
pool.cidr = 10.9.4.0/24
pool.exclude = 10.9.4.1
routing.nat.enabled = true
routing.forward_private = true
dns.enabled = true
dns.listen = 10.9.4.1
dns.upstream = 1.1.1.1
obf.mode = obfs
obf.obfs_key = CHANGEME-obfs-none-psk
obf.obfs_fronting = none
# AmneziaWG-style pre-handshake junk, OFF here. This is a TCP obfs profile, so enable on
# BOTH ends with the SAME jc (the receiver skips exactly jc records; on UDP profiles jc is
# sender-only instead). jc = junk packet count (0 = off, max 128), jmin/jmax = random size
# (jmin <= jmax <= 1400). Defaults: enabled=false, jc=0, jmin=40, jmax=300.
# obf.awg.enabled = true
# obf.awg.jc = 4
# obf.awg.jmin = 40
# obf.awg.jmax = 300
obf.padding.enabled = true
obf.padding.min_bytes = 40
obf.padding.max_bytes = 400
# Flow-shaping: Poisson-gapped idle cover REPLACES the fixed heartbeat, killing the
# ~15s small-packet beacon (a timing fingerprint). Empty encrypted records the peer
# drops; real packets are never delayed (zero added latency), only genuine idle is
# filled, capped by the budget below. Works on TCP and UDP profiles alike.
obf.heartbeat.enabled = false
obf.traffic_shaping.enabled = true
obf.traffic_shaping.idle_gap_mean_ms = 700
obf.traffic_shaping.idle_gap_min_ms = 40
obf.traffic_shaping.idle_gap_max_ms = 6000
obf.traffic_shaping.budget_bytes_per_sec = 16384
obf.traffic_shaping.min_size = 64
obf.traffic_shaping.max_size = 1024
obf.quic.enabled = false
obf.multipath.enabled = true
obf.multipath.adaptive = true
perf.tcp.nodelay = true
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

