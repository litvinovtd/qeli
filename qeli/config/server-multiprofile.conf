# ── users (global — usable on every profile) ────────────────────────────────
# Users live in a separate file — auth.users_file (default /etc/qeli/users.conf).
# Add with:  qeli add-client <name> --password <pass> --config <this file>
# (Argon2id-hashes the password and appends a [user:<name>] section to that FILE).
# You may instead inline [user:*] sections here, but then auth.users_file is
# ignored (inline wins) — don't set both.
