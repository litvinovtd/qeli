# ── 9) udp-obfs — ChaCha20 stream obfs over UDP — UDP :8450 ─────────────────
[profile:udp-obfs]
enabled = true
bind.address = 0.0.0.0
bind.port = 8450
bind.transport = udp
tun.name = vpn8
tun.address = 10.9.8.1
tun.netmask = 255.255.255.0
tun.mtu = 1400
tun.queues = 0
pool.cidr = 10.9.8.0/24
pool.exclude = 10.9.8.1
routing.nat.enabled = true
routing.forward_private = true
dns.enabled = true
dns.listen = 10.9.8.1
dns.upstream = 1.1.1.1
obf.mode = obfs
obf.obfs_key = CHANGEME-udp-obfs-psk
# AmneziaWG-style pre-handshake junk — works on UDP too, OFF here. On UDP `jc` is
# SENDER-ONLY: the client prepends `jc` decoy datagrams before its ClientHello and the
# server drops them cheaply (before its rate limiter), so nothing needs to match and a
# lost/reordered junk datagram is harmless. jc = decoy count (0 = off, max 128); jmin/jmax
# = random size (jmin <= jmax <= 1400; each capped at 1200 on UDP so it never IP-fragments).
# obf.awg.enabled = true
# obf.awg.jc = 4
# obf.awg.jmin = 40
# obf.awg.jmax = 300
obf.padding.enabled = false
# Flow-shaping: Poisson-gapped idle cover REPLACES the fixed heartbeat, killing the
# ~15s small-packet beacon (a timing fingerprint). Empty encrypted records the peer
# drops; real packets are never delayed (zero added latency), only genuine idle is
# filled, capped by the budget below. Works on TCP and UDP profiles alike.
obf.heartbeat.enabled = false
obf.traffic_shaping.enabled = true
obf.traffic_shaping.idle_gap_mean_ms = 700
obf.traffic_shaping.idle_gap_min_ms = 40
obf.traffic_shaping.idle_gap_max_ms = 6000
obf.traffic_shaping.budget_bytes_per_sec = 16384
obf.traffic_shaping.min_size = 64
obf.traffic_shaping.max_size = 1024
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

# ── 10) obfs-awg — obfs + AmneziaWG-style junk preamble (the Amnezia analog) — TCP :8451 ─
# A raw ChaCha20 obfs stream preceded by `jc` random junk packets before the nonce
# exchange (mimics AmneziaWG's Jc/Jmin/Jmax). "obfs mode + obf.awg.enabled" IS the
# whole mode — there is no separate wire mode. The CLIENT must set the SAME jc (it
# rides in the qeli:// link / QR automatically).
[profile:obfs-awg]
enabled = true
bind.address = 0.0.0.0
bind.port = 8451
bind.transport = tcp
tun.name = vpn9
tun.address = 10.9.9.1
tun.netmask = 255.255.255.0
tun.mtu = 1400
tun.queues = 0
pool.cidr = 10.9.9.0/24
pool.exclude = 10.9.9.1
routing.nat.enabled = true
routing.forward_private = true
dns.enabled = true
dns.listen = 10.9.9.1
dns.upstream = 1.1.1.1
obf.mode = obfs
obf.obfs_key = CHANGEME-obfs-awg-psk
obf.obfs_fronting = none
# The defining feature of this profile — both ends MUST use the same jc (0 = off,
# max 128); jmin/jmax = random junk size bounds (jmin <= jmax <= 1400).
obf.awg.enabled = true
obf.awg.jc = 4
obf.awg.jmin = 40
obf.awg.jmax = 200
obf.padding.enabled = true
obf.padding.min_bytes = 40
obf.padding.max_bytes = 400
obf.heartbeat.enabled = false
obf.traffic_shaping.enabled = true
obf.traffic_shaping.idle_gap_mean_ms = 700
obf.traffic_shaping.idle_gap_min_ms = 40
obf.traffic_shaping.idle_gap_max_ms = 6000
obf.traffic_shaping.budget_bytes_per_sec = 16384
obf.traffic_shaping.min_size = 64
obf.traffic_shaping.max_size = 1024
obf.quic.enabled = false
obf.multipath.enabled = true
obf.multipath.adaptive = true
perf.tcp.nodelay = true
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
