# ── 4) obfs-ws — ChaCha20 stream obfs + WebSocket-fronting — TCP :8445 ───────
[profile:obfs-ws]
enabled = true
bind.address = 0.0.0.0
bind.port = 8445
bind.transport = tcp
tun.name = vpn3
tun.address = 10.9.3.1
tun.netmask = 255.255.255.0
tun.mtu = 1280
tun.queues = 0
pool.cidr = 10.9.3.0/24
pool.exclude = 10.9.3.1
routing.nat.enabled = true
routing.forward_private = true
dns.enabled = true
dns.listen = 10.9.3.1
dns.upstream = 1.1.1.1
obf.mode = obfs
# REQUIRED for obfs: a strong shared secret that MUST match the client.
obf.obfs_key = CHANGEME-obfs-ws-psk
obf.obfs_fronting = websocket
obf.padding.enabled = false
obf.heartbeat.enabled = true
obf.heartbeat.interval_ms = 15000
obf.heartbeat.jitter_ms = 2000
obf.quic.enabled = false
obf.multipath.enabled = true
obf.multipath.adaptive = true
perf.tcp.nodelay = true
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
perf.connection.idle_timeout_secs = 0

