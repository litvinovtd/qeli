# ============================================================================
#  qeli server — flat-INI config (the single supported format; TOML/JSON dropped)
# ----------------------------------------------------------------------------
#  This file is an EXHAUSTIVE reference: every key the server understands is
#  listed with its DEFAULT value and a one-line note. A real deployment only
#  needs a handful of keys (any omitted key falls back to the default shown
#  here), so feel free to delete what you don't change.
#
#  NOTE: comments must be on their OWN line (a leading '#'). Inline comments
#  after a value are NOT stripped — they become part of the value.
#
#  Structure:
#    [auth] [web] [logging]       — global singleton sections
#    [profile:<name>]             — one per interface; nested fields are dotted
#                                   keys (bind.port, obf.mode, perf.connection.*)
#    [user:<name>] [group:<name>] — inline users/groups (or auth.users_file)
#
#  Pin the server key on clients:  qeli show-identity --config /etc/qeli/server.conf
# ============================================================================

[auth]
# Path to the standalone user database (used when no inline [user:*] sections).
users_file = /etc/qeli/users.conf
# Password hashing scheme for stored hashes. Only argon2id is supported.
password_hash = argon2id
# Auth/session token lifetime (seconds).
token_ttl_secs = 86400
# true = reject clients that did not pin the server key (no TOFU). Default false.
require_client_key_proof = false
# H-1 — bind the data-plane session keys to this server's static identity (Noise-IK):
# the KDF also folds in es = X25519(client_eph, server_static), so a failed ephemeral
# RNG alone no longer exposes the tunnel. **Default true (since 0.7.1).** WIRE-BREAKING:
# only clients that pin this server's key AND run H-1 (their default) can connect — a
# legacy 0.7.0 / TOFU client is rejected. Implies pinning, so it pairs with
# require_client_key_proof = true. Set false ONLY to interoperate with a 0.7.0 fleet
# during a staged upgrade.
bind_static_to_session = true
# Brute-force lockout (per source IP). A username under attack gets an adaptive
# tarpit instead of a hard lock, so a correct password always passes.
brute_force.max_attempts = 5
brute_force.window_secs = 300
brute_force.lockout_secs = 900

[web]
# Admin UI. Disabled by default. Full guide: docs/{ru,eng}/PANEL.md
enabled = false
# Bind 127.0.0.1 = reach it over an SSH tunnel (ssh -L 8080:127.0.0.1:8080 root@host).
# A public IP needs tls + password_hash below (see fail-closed note).
bind = 127.0.0.1
port = 8080
username = admin
# Argon2id hash of the panel password. EASIEST: let qeli set it for you (works on a
# fresh install with no panel access yet) — generates+enables+writes it here:
#   qeli set-web-password                       # random password, printed once
#   qeli set-web-password --password 'PASS'     # your own password
# Or set it in-panel (Config -> Web -> Set admin password), or hand-roll a hash:
#   printf '%s' 'PASS' | argon2 "$(head -c12 /dev/urandom|base64)" -id -t 3 -m 15 -p 1 -e
# FAIL-CLOSED: a non-loopback bind with an empty password_hash refuses to start.
# password_hash = $argon2id$...
# Native HTTPS (rustls) so the panel can be exposed on a public IP without a proxy.
# Empty tls_cert/tls_key = self-signed, auto-generated & persisted to
# /etc/qeli/web-tls-*.pem (browser warns once). Set both for a real (Let's Encrypt) cert.
# tls = true
# tls_cert = /etc/letsencrypt/live/vpn.example.com/fullchain.pem
# tls_key  = /etc/letsencrypt/live/vpn.example.com/privkey.pem
# Source-IP allowlist (CIDRs / bare IPs). Empty = any source. Strongest barrier
# for a public bind — include your own admin IP or you'll 403 yourself.
# allowed_ips = 203.0.113.4, 10.0.0.0/8
# Default public host for share links/QR (pre-fills the Share dialog; editable there).
# public_host = vpn.example.com
# Add the `Secure` flag to the session cookie. Auto-on when tls = true; set it
# manually only behind a TLS reverse proxy. Never on plain HTTP (would lock you out).
secure_cookie = false

[logging]
# error | warn | info | debug
level = info
# Log file; omit -> stderr / journald.
# file = /var/log/qeli/server.log
# plain | json
format = plain

# ── A TCP profile: fake-TLS on :443. One [profile:<name>] per interface. ─────
[profile:tcp]
# true (default) = bound and served; false = kept but skipped at startup (turn a
# profile off without deleting it). At least one profile must be enabled.
enabled = true
# This profile's static identity (X25519) private key. Default: per-profile
# /etc/qeli/identity/<name>.key (auto-created on first start).
# identity_key = /etc/qeli/identity/tcp.key

# -- bind --------------------------------------------------------------------
bind.address = 0.0.0.0
bind.port = 443
# tcp | udp  (udp requires obf.mode = fake-tls; plain is TCP-only)
bind.transport = tcp

# -- tun ---------------------------------------------------------------------
tun.name = vpn0
tun.address = 10.0.0.1
tun.netmask = 255.255.255.0
# TUN MTU, also PUSHED to clients at auth (a client on mtu=0/auto adopts it).
tun.mtu = 1400
# tx queue length of the TUN device.
tun.tx_queue_len = 1000
# tun | tap
tun.device_type = tun
# Multi-queue TUN (data-plane parallelism). 0 = auto (= CPU count); N = N queues;
# 1 = legacy single pump. Linux IFF_MULTI_QUEUE; server-only, no wire change.
tun.queues = 0

# -- address pool ------------------------------------------------------------
pool.cidr = 10.0.0.0/24
# IPs never handed out (comma-separated). Always exclude the gateway (tun.address).
pool.exclude = 10.0.0.1
pool.lease_time_secs = 3600
# Static IP reservations by username (repeatable):
# pool.reservation.alice = 10.0.0.100

# -- routing -----------------------------------------------------------------
# Allow client<->client traffic within the tunnel subnet.
routing.client_to_client = false
# Forward RFC1918/private networks reachable behind the server to clients.
routing.forward_private = true
# MASQUERADE client traffic to the internet (full-tunnel gateway). Default false.
routing.nat.enabled = true
# NAT egress interface; auto-detected when left at the default.
routing.nat.interface = eth0
# Advertised route(s) pushed to clients (repeatable):
# route = 192.168.50.0/24 gateway=10.0.0.1 metric=100

# -- in-tunnel DNS proxy -----------------------------------------------------
# When disabled the server pushes NO DNS and clients keep their own resolvers.
dns.enabled = true
dns.listen = 10.0.0.1
dns.port = 53
# Upstream resolvers (comma-separated).
dns.upstream = 1.1.1.1, 8.8.8.8
# udp | tcp | tls (DoT)
dns.upstream_protocol = udp
dns.cache_size = 1000
dns.timeout_secs = 5
# Domains answered with 0.0.0.0 (ad/track blocking), comma-separated:
# dns.blocklist = ads.example.com, track.example.com

# -- DHCP server (optional; most setups push IPs at auth instead) ------------
dhcp.enabled = false
dhcp.listen = 0.0.0.0:67
# dhcp.pool_start = 10.0.0.50
# dhcp.pool_end = 10.0.0.200
dhcp.lease_time_secs = 86400
dhcp.domain_name = vpn

# -- obfuscation: wire mode --------------------------------------------------
# Data-plane AEAD. chacha20-poly1305 (default) | aes-256-gcm | aes-128-gcm
obf.cipher = chacha20-poly1305
# Wire mode: plain | fake-tls | obfs.  (reality-tls = fake-tls + reality_proxy
# below with real_tls=true.)  obfs is TCP-only; plain is TCP-only.
obf.mode = fake-tls
# Pre-shared key, REQUIRED for obf.mode = obfs (must match the client):
# obf.obfs_key = shared-secret
# obfs anti-FET fronting: websocket (default, HTTP-looking first bytes) | none.
obf.obfs_fronting = websocket

# -- obfuscation: fake-TLS handshake shaping ---------------------------------
obf.tls.server_name = www.cloudflare.com
# Decoy SNI pool (camouflage), comma-separated.
obf.tls.server_names = www.cloudflare.com, www.google.com, www.microsoft.com, www.apple.com, www.amazon.com
# Put a (REALITY) crypto token in the ClientHello session_id.
obf.tls.session_id = true
# Named groups advertised in the ClientHello (fingerprint shaping).
obf.tls.supported_groups = x25519, secp256r1
obf.tls.key_share_entropy_bytes = 32

# -- obfuscation: REALITY proxy (anti active-probing) ------------------------
# When enabled, "foreign" handshakes (probes) are transparently bridged to a real
# site; only authenticated qeli clients get the tunnel.
obf.tls.reality_proxy.enabled = false
# Real site probes are bridged to (and whose cert/JA3S we borrow in real_tls mode).
obf.tls.reality_proxy.target = www.cloudflare.com
obf.tls.reality_proxy.target_port = 443
# REALITY short_ids accepted from clients (hex, <=8 bytes), comma-separated. Empty
# = legacy ALPN-absence detection. Generate with `qeli` / `gen_reality_link`.
# obf.tls.reality_proxy.short_ids = 7e78a17ad41f1004
# true = terminate authenticated clients inside a GENUINE TLS 1.3 session (real TLS
# on the wire, "reality-tls"); false (default) = fake-TLS directly on the socket.
obf.tls.reality_proxy.real_tls = false
# With real_tls: true (default) = hand-rolled byte-grade TLS that BORROWS the
# target's real cert chain + mirrors its ServerHello JA3S (Xray-REALITY parity);
# false = rustls (self-signed, weaker camouflage). Both need realtls-capable clients.
obf.tls.reality_proxy.handrolled = true
# How long (ms) to peek the ClientHello before classifying peer as client vs probe.
# Higher tolerates slow/high-latency clients without mis-bridging them to the decoy.
obf.tls.reality_proxy.peek_timeout_ms = 1500

# -- obfuscation: padding ----------------------------------------------------
obf.padding.enabled = true
obf.padding.min_bytes = 32
obf.padding.max_bytes = 512
obf.padding.randomize = true
# Fraction of packets padded (0.0-1.0).
obf.padding.probability = 1.0

# -- obfuscation: fragmentation ----------------------------------------------
obf.fragmentation.enabled = true
obf.fragmentation.min_chunk_size = 64
obf.fragmentation.max_chunk_size = 512
obf.fragmentation.max_fragments_per_packet = 16

# -- obfuscation: heartbeat (cover traffic) ----------------------------------
obf.heartbeat.enabled = true
obf.heartbeat.interval_ms = 15000
obf.heartbeat.data_size_bytes = 16
obf.heartbeat.jitter_ms = 20

# -- obfuscation: extras -----------------------------------------------------
# HTTP/2 frame masking.
obf.http2_masking.enabled = false
obf.http2_masking.ratio = 0.1
# Pad records up to fixed "round" sizes to flatten the size histogram.
obf.traffic_normalization.enabled = false
obf.traffic_normalization.round_sizes = 64, 128, 256, 512, 1024, 1500
obf.traffic_normalization.randomize_sequence = false
# Per-connection cipher rotation + handshake jitter.
obf.anti_fingerprinting.enabled = false
obf.anti_fingerprinting.rotate_ciphers_every = 300
obf.anti_fingerprinting.add_jitter_to_handshake = true
# UDP/QUIC masking (udp profiles only).
obf.quic.enabled = false
obf.quic.cid_length = 4
obf.quic.version = 1

# -- stream bonding (multipath; TCP modes only) ------------------------------
# Aggregate several parallel connections into one tunnel to beat the
# single-stream TCP-over-TCP ceiling. Leave off / max_streams=1 on UDP profiles.
obf.multipath.enabled = false
# Hard ceiling of parallel streams per session (also the fixed count if !adaptive).
obf.multipath.max_streams = 4
# false = open exactly max_streams; true = auto-ramp by measured throughput.
obf.multipath.adaptive = false

# -- performance: TCP socket -------------------------------------------------
perf.tcp.nodelay = true
perf.tcp.keepalive_secs = 60
perf.tcp.send_buffer_size = 262144
perf.tcp.recv_buffer_size = 262144

# -- performance: TUN pump ---------------------------------------------------
perf.tun.read_buffer_size = 65535
perf.tun.write_buffer_size = 65535
perf.tun.read_timeout_ms = 10
perf.tun.max_pending_packets = 256

# -- performance: connection limits ------------------------------------------
# Total sessions this PROFILE accepts (all users). Per-USER device caps are the
# `max_sessions` key on [user:]/[group:] below.
perf.connection.max_clients = 128
perf.connection.handshake_timeout_secs = 10
# 0 = never idle-drop (RX-liveness still reaps dead clients).
perf.connection.idle_timeout_secs = 300
perf.connection.rate_limit_packets_per_sec = 10000
# New-session flood limit per source IP: at most N new sessions per window.
perf.connection.new_session_rate_max = 10
perf.connection.new_session_rate_window_secs = 60

# ── A second profile, e.g. UDP fake-TLS on :1443 (delete if unused). ────────
# [profile:udp]
# bind.port = 1443
# bind.transport = udp
# tun.name = vpn1
# tun.address = 10.1.0.1
# pool.cidr = 10.1.0.0/24
# pool.exclude = 10.1.0.1
# obf.mode = fake-tls

# ── Inline users (or point auth.users_file at a separate file) ──────────────
[user:client1]
# Argon2id hash (generate with `qeli add-client <name>`).
password_hash = $argon2id$v=19$m=16384,t=2,p=1$cWVsaVNhbHRWYWw$CCYuTv8pvqQrvhrBQW3KjPpEN0MZaFfTKv3HOcGqB8w
enabled = true
# Fixed tunnel IP for this user (else pool-assigned):
# static_ip = 10.0.0.100
# Source networks allowed to authenticate (CIDR, comma-separated). Empty = any.
# allowed_networks = 203.0.113.0/24
# Inherit max_sessions / bandwidth from a [group:] template:
# group = premium
# Max concurrent DEVICES for this user. 0 = inherit group, then unlimited. At the
# cap a NEW device evicts this user's OLDEST session; same device reuses its slot.
max_sessions = 2
# Restrict to these profiles (comma-separated). Empty/absent = all profiles.
# profiles = tcp, udp
# Per-user bandwidth cap (Mbit/s; 0 = unlimited):
# bandwidth.limit_mbps = 50
# bandwidth.burst_mbps = 100
# Arbitrary metadata (repeatable, metadata.<key> = <value>):
# metadata.note = office laptop
# Per-user advertised route(s) (repeatable):
# route = 10.20.0.0/16 gateway=10.0.0.1 metric=100

# ── Optional group templates (inherited by users via `group = <name>`) ──────
# [group:premium]
# bandwidth_limit_mbps = 100
# max_sessions = 5
# allowed_networks = 0.0.0.0/0
