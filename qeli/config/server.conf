# ============================================================================
#  qeli server — flat-INI config (the single supported format; TOML/JSON dropped)
# ----------------------------------------------------------------------------
#  NOTE: comments must be on their OWN line (a leading '#'). Inline comments
#  after a value are NOT stripped — they become part of the value.
#
#  Structure:
#    [auth] [web] [logging]       — global sections
#    [profile:<name>]             — one per interface; nested fields are dotted
#                                   keys (bind.port, obf.mode, perf.connection.*)
#    [user:<name>] [group:<name>] — inline users/groups (or auth.users_file)
#
#  Pin the server key on clients:  qeli show-identity --config /etc/qeli/server.conf
# ============================================================================

[auth]
# users_file = /etc/qeli/users.conf
# true = reject clients that did not pin the server key
require_client_key_proof = false
brute_force.max_attempts = 5
brute_force.window_secs = 60
brute_force.lockout_secs = 300

[web]
# admin UI on http://bind:port (disabled by default)
enabled = false
bind = 127.0.0.1
port = 8080
username = admin
# password_hash = $argon2id$...   (no standalone hasher: copy an Argon2id hash,
# e.g. one produced by `qeli add-client` for any user)

[logging]
# error | warn | info | debug
level = info
# file = /var/log/qeli/server.log   (omit -> stderr / journald)

# ── a TCP profile: fake-TLS on :443, full-tunnel with NAT ───────────────────
[profile:tcp]
# true (default) = this profile is bound and served; false = kept in the config
# but skipped at startup (turn a profile off without deleting it). At least one
# profile must be enabled.
enabled = true
# identity_key default: /etc/qeli/identity/<name>.key
bind.address = 0.0.0.0
bind.port = 443
# tcp | udp
bind.transport = tcp
tun.name = vpn0
tun.address = 10.0.0.1
tun.netmask = 255.255.255.0
# TUN MTU. Also PUSHED to clients at auth: a client on mtu=0 (auto, the default)
# adopts this value; a client that set its own mtu keeps it. Set this per profile
# to control client MTU centrally (e.g. lower it for clients behind reduced-MTU
# paths) without touching any client config.
tun.mtu = 1400
# Multi-queue TUN (data-plane parallelism across cores). 0 = auto (= CPU count) so
# the server uses all cores; N = that many queues; 1 = legacy single pump. Linux
# IFF_MULTI_QUEUE; server-only, no wire/client change.
tun.queues = 0
pool.cidr = 10.0.0.0/24
pool.exclude = 10.0.0.1
# MASQUERADE client traffic to the internet (interface auto-detected)
routing.nat.enabled = true
# advertised route(s), repeatable:
# route = 192.168.50.0/24 gateway=10.0.0.1 metric=100
# In-tunnel DNS proxy. If disabled, the server pushes NO DNS and clients use
# their own resolvers. Enable to hand clients a working in-tunnel resolver.
dns.enabled = true
dns.listen = 10.0.0.1
dns.upstream = 1.1.1.1
# fake-tls | obfs
obf.mode = fake-tls
# obf.obfs_key = shared-secret   (required for obf.mode = obfs)
obf.tls.server_name = www.cloudflare.com
# Decoy SNI pool (camouflage). Comma-separated; defaults to a built-in set of
# high-traffic domains. Surfaced here so it can be set per profile in the config
# instead of being hard-coded.
# obf.tls.server_names = www.cloudflare.com, www.google.com, www.microsoft.com, www.apple.com, www.amazon.com
obf.padding.enabled = true
obf.padding.min_bytes = 0
obf.padding.max_bytes = 255
obf.heartbeat.enabled = true
obf.heartbeat.interval_ms = 15000
obf.heartbeat.jitter_ms = 2000
# UDP/QUIC masking (udp profiles only)
obf.quic.enabled = false
# Stream bonding (TCP modes only): aggregate several parallel connections into one
# tunnel to beat the single-stream TCP-over-TCP ceiling. See docs/CONFIG.md.
obf.multipath.enabled = false      # true to enable bonding on this profile
obf.multipath.max_streams = 4      # hard ceiling of parallel streams per session
obf.multipath.adaptive = false     # false = open exactly max_streams; true = auto-ramp by throughput
# max_clients = total sessions this PROFILE accepts (all users combined). Per-USER
# device caps are separate — see `max_sessions` on [user:]/[group:] below.
perf.connection.max_clients = 64
perf.connection.handshake_timeout_secs = 10
# 0 = never idle-drop (RX-liveness still reaps dead clients)
perf.connection.idle_timeout_secs = 300

# ── inline users (or point auth.users_file at a separate file) ──────────────
[user:client1]
password_hash = $argon2id$v=19$m=16384,t=2,p=1$cWVsaVNhbHRWYWw$CCYuTv8pvqQrvhrBQW3KjPpEN0MZaFfTKv3HOcGqB8w
enabled = true
# Max concurrent DEVICES for this user (each device has its own stable id). 0 =
# inherit from [group:], then unlimited. At the cap a NEW device evicts this user's
# OLDEST session (newest wins); a reconnect of the SAME device just reuses its slot.
max_sessions = 2
# group = premium      # inherit max_sessions / bandwidth from a [group:] template
# profiles = tcp
