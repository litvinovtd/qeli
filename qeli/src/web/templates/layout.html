<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qeli — {{title}}</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='54' cy='54' r='30' stroke='%234a9eff' stroke-width='11' fill='none'/%3E%3Cline x1='72' y1='72' x2='96' y2='96' stroke='%234a9eff' stroke-width='11' stroke-linecap='round'/%3E%3Ccircle cx='98' cy='98' r='12' fill='%2300e676'/%3E%3C/svg%3E">
<!-- Self-hosted assets — no runtime CDN (works on an air-gapped server behind
     an SSH tunnel). Regenerate app.css with `cd web-assets && npm run build`. -->
<link rel="stylesheet" href="/assets/app.css">
<script defer src="/assets/alpine.js"></script>
<!-- i18n: DOM-translation layer + language dropdown (extensible; default English). -->
<script defer src="/assets/i18n.js"></script>
</head>
<body class="flex h-screen overflow-hidden" x-data="app()" x-init="init()" @notify.window="notify($event.detail.msg, $event.detail.type)">

<div class="bg-grid"></div>
<div class="bg-glow bg-glow--1"></div>
<div class="bg-glow bg-glow--2"></div>

<!-- Sidebar -->
<aside class="w-56 flex flex-col flex-shrink-0 relative z-10" style="background:rgba(8,11,20,.6);backdrop-filter:blur(12px);border-right:1px solid var(--line)">
  <!-- Brand band — exactly one topbar tall so its bottom border lines up with
       the content topbar's divider. -->
  <div class="flex items-center gap-3 px-5 flex-shrink-0" style="height:var(--topbar-h);border-bottom:1px solid var(--line)">
    <svg width="30" height="30" viewBox="0 0 120 120" fill="none" style="filter:drop-shadow(0 0 8px rgba(74,158,255,.45))">
      <circle cx="54" cy="54" r="30" stroke="#4a9eff" stroke-width="11" fill="none"/>
      <line x1="72" y1="72" x2="96" y2="96" stroke="#4a9eff" stroke-width="11" stroke-linecap="round"/>
      <circle cx="98" cy="98" r="12" fill="#00e676"/>
      <circle cx="98" cy="98" r="4.5" fill="#080b14"/>
    </svg>
    <div>
      <div class="text-sm font-extrabold text-white leading-tight tracking-tight">Qeli VPN</div>
      <div class="text-[10px]" style="color:var(--txt-dim)" x-text="'v' + version">v—</div>
    </div>
  </div>

  <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
    <a href="/" class="nav-link" :class="{ active: page === 'dashboard' }">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke-width="1.8"/></svg>
      Dashboard
    </a>
    <a href="/users" class="nav-link" :class="{ active: page === 'users' }">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.8" stroke-linecap="round" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Users
    </a>
    <a href="/config" class="nav-link" :class="{ active: page === 'config' }">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.8" stroke-linecap="round" d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path stroke-width="1.8" d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Config
    </a>
    <a href="/client" class="nav-link" :class="{ active: page === 'client' }">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      Client
    </a>
    <a href="/logs" class="nav-link" :class="{ active: page === 'logs' }">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.8" stroke-linecap="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01m-.01 4h.01"/></svg>
      Logs
    </a>
  </nav>

  <!-- Status + logout -->
  <div class="p-3 space-y-1" style="border-top:1px solid var(--line)">
    <!-- Language picker (populated by i18n.js; add locales there). -->
    <div class="flex items-center gap-2 px-2 py-1.5">
      <svg class="w-4 h-4 flex-shrink-0" style="color:var(--txt-dim)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke-width="1.7"/><path stroke-width="1.7" d="M3 12h18M12 3a15 15 0 010 18M12 3a15 15 0 000 18"/></svg>
      <select id="qeli-lang" class="inp" style="height:30px;padding:3px 8px;font-size:.8rem" aria-label="Language"></select>
    </div>
    <div class="flex items-center gap-2 px-2 py-1.5">
      <div class="w-2 h-2 rounded-full flex-shrink-0" :style="serverOk ? 'background:#00e676;box-shadow:0 0 8px #00e676' : 'background:#ff5d6c'"></div>
      <span class="text-xs" style="color:var(--txt-dim)" x-text="serverOk ? 'Server online' : 'Server offline'"></span>
    </div>
    <button @click="logout()" class="nav-link w-full" style="cursor:pointer;background:none;border:none;font:inherit">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Log out
    </button>
  </div>
</aside>

<!-- Main -->
<div class="flex-1 flex flex-col overflow-hidden relative z-10">
  <!-- Topbar — same height as the sidebar brand band (their dividers align). -->
  <header class="flex items-center justify-between px-6 flex-shrink-0" style="height:var(--topbar-h);background:rgba(8,11,20,.55);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)">
    <h1 class="text-base font-semibold text-white" x-text="pageTitle">Dashboard</h1>
    <div class="flex items-center gap-4 text-xs" style="color:var(--txt-dim)">
      <span>Total clients: <strong class="text-white" x-text="totalClients">0</strong></span>
      <span class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full" style="background:#16c8b6"></span>
        Auto-refresh <strong class="text-white">10s</strong>
      </span>
    </div>
  </header>

  <!-- Page content. Top padding lives on the inner wrapper (not on <main>) so a
       sticky in-page bar can pin flush under the topbar with no gap above it,
       while pages still get their top spacing. -->
  <main class="flex-1 overflow-auto px-6 pb-6">
    <div id="page-content" class="pt-6">{{content}}</div>
  </main>
</div>

<!-- Toast -->
<div x-cloak x-show="toast.show" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
  class="fixed bottom-5 right-5 z-[60] flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium text-white"
  :style="toast.type === 'error' ? 'background:linear-gradient(110deg,#ff5d6c,#e0384a)' : toast.type === 'warn' ? 'background:linear-gradient(110deg,#ffb020,#e08a00)' : 'background:linear-gradient(110deg,#16c8b6,#00b894)'">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <template x-if="toast.type === 'error'"><path stroke-width="2" stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></template>
    <template x-if="toast.type !== 'error'"><path stroke-width="2" stroke-linecap="round" d="M5 13l4 4L19 7"/></template>
  </svg>
  <span x-text="toast.msg"></span>
</div>

<script>
function app() {
  return {
    version: '—',
    page: '{{page}}',
    serverOk: true,
    totalClients: 0,
    toast: { show: false, msg: '', type: 'success', _t: null },

    get pageTitle() {
      return { dashboard: 'Dashboard', users: 'Users', config: 'Configuration', client: 'Client connections', logs: 'Logs' }[this.page] || 'Qeli';
    },

    init() {
      this.fetchStatus();
      setInterval(() => this.fetchStatus(), 10000);
    },

    async fetchStatus() {
      try {
        const d = await fetch('/api/status').then(r => r.json());
        this.serverOk = d.ok;
        this.totalClients = d.client_count || 0;
        this.version = d.version || '—';
      } catch { this.serverOk = false; }
    },

    notify(msg, type = 'success') {
      clearTimeout(this.toast._t);
      this.toast = { show: true, msg, type, _t: setTimeout(() => this.toast.show = false, 3500) };
    },

    async logout() {
      try { await fetch('/api/logout', { method: 'POST' }); } catch {}
      window.location.href = '/login';
    }
  };
}

// Any request that comes back 401 means the session expired — bounce to login.
(function () {
  const orig = window.fetch;
  window.fetch = async function (...args) {
    const res = await orig.apply(this, args);
    if (res.status === 401 && !location.pathname.startsWith('/login')) {
      location.href = '/login';
    }
    return res;
  };
})();

// Global helpers
function fmt(b) {
  if (!b) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}
function dur(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + (Math.floor(s/60)%60) + 'm';
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
// Cryptographically-random lowercase hex string of `n` chars (n even).
function randHex(n) {
  const a = new Uint8Array(n / 2);
  crypto.getRandomValues(a);
  return Array.from(a, b => b.toString(16).padStart(2, '0')).join('');
}

// Trigger a server restart (re-exec) so on-disk config changes go live, then
// poll /api/status until it answers again. Returns true once back online.
async function restartServer(maxWaitMs = 25000) {
  try {
    const r = await fetch('/api/server/restart', { method: 'POST' }).then(r => r.json()).catch(() => ({ ok: true }));
    if (r && r.ok === false) throw new Error(r.error || 'restart rejected');
  } catch (e) {
    throw e;
  }
  // The server re-execs ~0.5s after replying; wait for it to disappear then return.
  const start = Date.now();
  await new Promise(res => setTimeout(res, 1500));
  while (Date.now() - start < maxWaitMs) {
    try {
      const d = await fetch('/api/status', { cache: 'no-store' }).then(r => r.json());
      if (d && d.ok) return true;
    } catch {}
    await new Promise(res => setTimeout(res, 1000));
  }
  return false;
}
</script>
</body>
</html>
