<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
<title>Транспортные режимы qeli</title>
<desc>Одно зашифрованное ядро упаковывается пятью способами: plain, fake-tls, obfs, reality-tls, QUIC.</desc>
<rect x="0" y="0" width="680" height="320" rx="10" fill="#FBFAF7" stroke="#E7E5DE"/>
<text x="340" y="38" text-anchor="middle" font-size="19" font-weight="500" fill="#2C2C2A">Транспортные режимы: одно ядро, разные обёртки</text>

<g>
<rect x="40" y="70" width="110" height="110" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="95" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">plain</text>
<text x="95" y="124" text-anchor="middle" font-size="11.5" fill="#5F5E5A">без обёртки</text>
<text x="95" y="142" text-anchor="middle" font-size="11.5" fill="#5F5E5A">[len][nonce][ct]</text>
<text x="95" y="162" text-anchor="middle" font-size="11.5" fill="#5F5E5A">макс. скорость</text>
</g>

<g>
<rect x="162" y="70" width="110" height="110" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
<text x="217" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">fake-tls</text>
<text x="217" y="124" text-anchor="middle" font-size="11.5" fill="#534AB7">форма TLS-записей</text>
<text x="217" y="142" text-anchor="middle" font-size="11.5" fill="#534AB7">GREASE-ClientHello</text>
<text x="217" y="162" text-anchor="middle" font-size="11.5" fill="#534AB7">случайный порядок</text>
</g>

<g>
<rect x="284" y="70" width="110" height="110" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
<text x="339" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">obfs</text>
<text x="339" y="124" text-anchor="middle" font-size="11.5" fill="#534AB7">ChaCha20-XOR</text>
<text x="339" y="142" text-anchor="middle" font-size="11.5" fill="#534AB7">WS-Upgrade префикс</text>
<text x="339" y="162" text-anchor="middle" font-size="11.5" fill="#534AB7">печатаемый HTTP</text>
</g>

<g>
<rect x="406" y="70" width="110" height="110" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
<text x="461" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">reality-tls</text>
<text x="461" y="124" text-anchor="middle" font-size="11.5" fill="#534AB7">настоящий TLS 1.3</text>
<text x="461" y="142" text-anchor="middle" font-size="11.5" fill="#534AB7">cert-borrowing</text>
<text x="461" y="162" text-anchor="middle" font-size="11.5" fill="#534AB7">JA4 как Chrome</text>
</g>

<g>
<rect x="528" y="70" width="110" height="110" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
<text x="583" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">QUIC</text>
<text x="583" y="124" text-anchor="middle" font-size="11.5" fill="#534AB7">форма QUIC</text>
<text x="583" y="142" text-anchor="middle" font-size="11.5" fill="#534AB7">(UDP)</text>
<text x="583" y="162" text-anchor="middle" font-size="11.5" fill="#534AB7">лёгкая маскировка</text>
</g>

<line x1="95" y1="180" x2="95" y2="216" stroke="#B4B2A9" stroke-width="1.5"/>
<line x1="217" y1="180" x2="217" y2="216" stroke="#B4B2A9" stroke-width="1.5"/>
<line x1="339" y1="180" x2="339" y2="216" stroke="#B4B2A9" stroke-width="1.5"/>
<line x1="461" y1="180" x2="461" y2="216" stroke="#B4B2A9" stroke-width="1.5"/>
<line x1="583" y1="180" x2="583" y2="216" stroke="#B4B2A9" stroke-width="1.5"/>

<rect x="40" y="218" width="598" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="339" y="244" text-anchor="middle" font-size="15" font-weight="500" fill="#04342C">Общее ядро: один и тот же зашифрованный туннель</text>
<text x="339" y="266" text-anchor="middle" font-size="12.5" fill="#0F6E56">ChaCha20-Poly1305 (AEAD) · channel binding · X25519 + ML-KEM-768</text>

<text x="340" y="304" text-anchor="middle" font-size="11.5" fill="#888780">меняется только внешняя обёртка — конфиденциальность и аутентификация всегда в ядре</text>
</svg>
