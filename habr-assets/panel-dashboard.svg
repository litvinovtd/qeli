<svg width="100%" viewBox="0 0 700 470" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
<title>Веб-панель Qeli — дашборд</title>
<desc>Админ-панель: быстрый старт сервера выбором режима маскировки и таблица активных сессий.</desc>
