<text x="430" y="400" font-size="11.5" fill="#4A9EFF">obfs</text>
<text x="520" y="400" font-size="11.5" fill="#E5EAF2">5.0 / 1.2</text>
<text x="630" y="400" font-size="11.5" fill="#9AA7B8">1 д</text>
<line x1="40" y1="412" x2="660" y2="412" stroke="#1E2940"/>

<text x="40" y="434" font-size="10.5" fill="#5B6678">SIGHUP-reload · профили · выдача qeli:// и QR — на соседних вкладках</text>
