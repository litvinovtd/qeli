<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#D8CFBE" opacity="0.55"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2552F"/>
      <stop offset="1" stop-color="#C2552F" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#F1EBDF"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="22" y="22" width="1156" height="586" rx="14" fill="none" stroke="#D8CFBE" stroke-width="2"/>

  <!-- ── left: text ─────────────────────────────────────────── -->
  <text x="92" y="170" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3.5" fill="#C2552F">OPEN-SOURCE VPN · RUST</text>

  <text x="90" y="262" font-family="'Segoe UI',system-ui,sans-serif" font-size="74" font-weight="800" fill="#2B2A28">Свой VPN</text>
  <text x="90" y="346" font-family="'Segoe UI',system-ui,sans-serif" font-size="74" font-weight="800" fill="#2B2A28">на Rust</text>

  <rect x="94" y="386" width="46" height="4" rx="2" fill="#C2552F"/>
  <text x="92" y="430" font-family="'Segoe UI',system-ui,sans-serif" font-size="25" font-weight="500" fill="#2B2A28">как я спорил с сетью, TLS</text>
  <text x="92" y="464" font-family="'Segoe UI',system-ui,sans-serif" font-size="25" font-weight="500" fill="#2B2A28">и самим собой</text>

  <text x="92" y="528" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" fill="#8A857B">TLS 1.3 · пост-квант · 5 режимов маскировки · ~700 Мбит/с</text>
  <circle cx="99" cy="566" r="4" fill="#C2552F"/>
  <text x="112" y="572" font-family="'Consolas','SF Mono',monospace" font-size="18" fill="#2B2A28">github.com/litvinovtd/qeli</text>

  <!-- ── right: stylised TLS tunnel ─────────────────────────── -->
  <g>
    <!-- the encrypted-tunnel capsule -->
    <rect x="758" y="300" width="332" height="44" rx="22" fill="#C2552F" fill-opacity="0.07" stroke="#C2552F" stroke-width="1.6" stroke-dasharray="7 6"/>

    <!-- TLS label above -->
    <text x="924" y="278" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="1.5" fill="#C2552F">TLS 1.3 · маскировка</text>

    <!-- packets flowing through -->
    <rect x="792" y="312" width="20" height="20" rx="5" fill="#2B2A28"/>
    <rect x="834" y="312" width="20" height="20" rx="5" fill="#C2552F"/>
    <rect x="876" y="312" width="20" height="20" rx="5" fill="#2B2A28"/>
    <rect x="918" y="312" width="20" height="20" rx="5" fill="#C2552F"/>
    <rect x="960" y="312" width="20" height="20" rx="5" fill="#2B2A28"/>
    <rect x="1002" y="312" width="20" height="20" rx="5" fill="#C2552F"/>
    <path d="M1034 322 l16 0 m-6 -6 l6 6 l-6 6" fill="none" stroke="#8A857B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- client node (with a padlock) -->
    <circle cx="724" cy="322" r="32" fill="#F1EBDF" stroke="#2B2A28" stroke-width="2.6"/>
    <path d="M719 318 v-4 a5 5 0 0 1 10 0 v4" fill="none" stroke="#C2552F" stroke-width="2.6"/>
    <rect x="714" y="318" width="20" height="15" rx="2.5" fill="#C2552F"/>
    <circle cx="724" cy="325" r="2.2" fill="#F1EBDF"/>
    <text x="724" y="384" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" fill="#8A857B">клиент</text>

    <!-- server node (rack) -->
    <circle cx="1124" cy="322" r="32" fill="#F1EBDF" stroke="#2B2A28" stroke-width="2.6"/>
    <rect x="1110" y="309" width="28" height="7" rx="1.5" fill="#2B2A28"/>
    <rect x="1110" y="319" width="28" height="7" rx="1.5" fill="#2B2A28"/>
    <rect x="1110" y="329" width="28" height="7" rx="1.5" fill="#2B2A28"/>
    <circle cx="1115" cy="312.5" r="1.6" fill="#C2552F"/>
    <circle cx="1115" cy="322.5" r="1.6" fill="#C2552F"/>
    <circle cx="1115" cy="332.5" r="1.6" fill="#C2552F"/>
    <text x="1124" y="384" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" fill="#8A857B">сервер</text>

    <!-- modes under the tunnel -->
    <text x="924" y="430" text-anchor="middle" font-family="'Consolas','SF Mono',monospace" font-size="15" fill="#8A857B">plain · fake-tls · obfs · reality-tls · QUIC</text>
  </g>
</svg>
